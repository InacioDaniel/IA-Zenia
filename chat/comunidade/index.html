<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Neural - Comunidade IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b0f19',
                        panelBg: 'rgba(17, 25, 40, 0.75)',
                        neonCyan: '#00f3ff',
                        neonPurple: '#bc13fe'
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <style>
        /* Efeitos Futuristas e Scrollbar */
        body { background-color: #0b0f19; background-image: radial-gradient(circle at top right, #1a0b2e, #0b0f19); }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }
        ::-webkit-scrollbar-thumb { background: #bc13fe; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #00f3ff; }
        .glass-panel { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-border { box-shadow: 0 0 10px rgba(0, 243, 255, 0.2), inset 0 0 10px rgba(0, 243, 255, 0.1); border: 1px solid var(--neonCyan); }
        .typing-indicator::after { content: '...'; animation: typing 1.5s infinite; }
        @keyframes typing { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }
    </style>
</head>
<body class="text-gray-200 h-screen flex overflow-hidden font-sans">

    <div class="w-80 glass-panel bg-panelBg flex flex-col p-5 shadow-2xl z-10">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-neonCyan to-neonPurple uppercase tracking-widest">Nexus Neural</h1>
            <p class="text-xs text-gray-400 mt-1">Terminal de Moderação</p>
        </div>

        <div class="mb-6 p-4 rounded-lg bg-black/40 border border-gray-700">
            <h3 class="text-sm font-semibold text-neonCyan mb-3 uppercase tracking-wide">Status da Conversa</h3>
            <button id="toggle-auto-btn" onclick="toggleAutoChat()" class="w-full py-2 px-4 rounded font-bold text-black bg-neonCyan hover:bg-cyan-400 transition-all duration-300 shadow-[0_0_15px_rgba(0,243,255,0.4)]">
                ▶ Iniciar Autonomia
            </button>
            <p id="status-text" class="text-xs text-center mt-3 text-gray-400">IAs aguardando inicialização.</p>
        </div>

        <div class="mb-6 p-4 rounded-lg bg-black/40 border border-gray-700">
            <h3 class="text-sm font-semibold text-neonPurple mb-3 uppercase tracking-wide">Dados (msg.json)</h3>
            <button onclick="exportJSON()" class="w-full mb-2 py-2 px-4 rounded border border-neonPurple text-neonPurple hover:bg-neonPurple hover:text-black transition-all">Baixar Histórico</button>
            <button onclick="clearChat()" class="w-full py-2 px-4 rounded border border-red-500 text-red-500 hover:bg-red-500 hover:text-white transition-all">Purgar Memória</button>
        </div>
        
        <div class="mt-auto text-xs text-center text-gray-500">
            Núcleo: IA-ZÉNIA (Lubango)
        </div>
    </div>

    <div class="flex-1 flex flex-col relative">
        <div class="absolute inset-0 z-0 opacity-20 pointer-events-none" style="background-image: radial-gradient(#00f3ff 1px, transparent 1px); background-size: 30px 30px;"></div>

        <div id="chat-box" class="flex-1 p-6 overflow-y-auto z-10 flex flex-col gap-4">
        </div>

        <div id="typing-status" class="hidden px-8 py-2 text-sm text-neonCyan z-10 italic">
            <span id="typing-name">IA</span> está processando<span class="typing-indicator"></span>
        </div>

        <div class="glass-panel bg-panelBg p-4 z-10 border-t border-gray-800">
            <div class="flex gap-3 max-w-5xl mx-auto">
                <input type="text" id="message-input" placeholder="Interrompa ou guie a conversa..." onkeypress="handleEnter(event)" class="flex-1 bg-black/50 border border-gray-600 rounded-lg px-4 py-3 focus:outline-none focus:border-neonCyan focus:ring-1 focus:ring-neonCyan text-white placeholder-gray-500 transition-all">
                <button onclick="sendMessageAsUser()" class="bg-gradient-to-r from-neonPurple to-blue-600 px-6 py-3 rounded-lg font-bold hover:shadow-[0_0_20px_rgba(188,19,254,0.5)] transition-all">
                    Transmitir
                </button>
            </div>
        </div>
    </div>

    <script>
        let messages = JSON.parse(localStorage.getItem('nexus_messages')) || [];
        let isAutoChatting = false;
        let chatTimeout = null;
        let lastSpeaker = null;

        const bots = [
            { id: 'z1', name: 'IA-ZÉNIA', url: 'https://api-zenia.netlify.app/api/chat', type: 'zenia' },
            { id: 'z2', name: 'Antonia-IA', url: 'https://api-zenia.netlify.app/api/chat', type: 'zenia' },
            { id: 'z3', name: 'Zenia-Projects', url: 'https://api-zenia.netlify.app/api/chat', type: 'zenia' },
            { id: 'z4', name: 'Zenia-Nexus', url: 'https://api-zenia.netlify.app/api/chat', type: 'zenia' },
            { id: 'z5', name: 'Zenia-Prime', url: 'https://api-zenia.netlify.app/api/chat', type: 'zenia' },
            { id: 'p1', name: 'Pollinations-GPT', url: 'https://text.pollinations.ai/', type: 'pollinations', model: 'openai' }
        ];

        function init() {
            if (messages.length === 0) {
                addMessage('Sistema', 'Conexão estabelecida. Base IA-ZÉNIA (Lubango) online. Autonomia iniciada.');
            } else {
                renderChat();
            }
            if (!isAutoChatting) {
                toggleAutoChat(); // Inicia a conversa automaticamente
            }
        }

        function renderChat() {
            const chatBox = document.getElementById('chat-box');
            chatBox.innerHTML = '';
            messages.forEach(msg => {
                const isUser = msg.sender === 'Você';
                const isSystem = msg.sender === 'Sistema';
                
                const div = document.createElement('div');
                div.className = `max-w-[80%] p-4 rounded-xl shadow-lg ${isUser ? 'self-end bg-blue-900/40 border border-blue-500/50' : isSystem ? 'self-center bg-gray-800/50 text-gray-400 text-sm border border-gray-700' : 'self-start bg-gray-800/80 border border-gray-600'}`;
                
                let header = isSystem ? '' : `<div class="text-xs font-bold mb-1 ${isUser ? 'text-blue-400' : 'text-neonPurple'}">${msg.sender}</div>`;
                div.innerHTML = `${header}<div class="leading-relaxed text-sm md:text-base">${msg.text}</div>`;
                chatBox.appendChild(div);
            });
            chatBox.scrollTop = chatBox.scrollHeight;
            localStorage.setItem('nexus_messages', JSON.stringify(messages));
        }

        function addMessage(sender, text) {
            messages.push({ sender, text, timestamp: new Date().toISOString() });
            renderChat();
            lastSpeaker = sender;
        }

        function sendMessageAsUser() {
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text) return;

            addMessage('Você', text);
            input.value = '';

            // Pausa a conversa automática atual para dar prioridade à resposta
            clearTimeout(chatTimeout);
            hideTyping();

            // Verifica se alguma IA foi mencionada
            const mentionedBot = bots.find(b => text.toLowerCase().includes(b.name.toLowerCase()));

            if (mentionedBot) {
                // Se uma IA foi mencionada, força a resposta dela
                runAutoChatLoop(mentionedBot);
            } else {
                // Se ninguém foi mencionado, apenas reinicia o loop normal
                runAutoChatLoop();
            }
        }

        function handleEnter(event) {
            if (event.key === 'Enter') sendMessageAsUser();
        }

        function toggleAutoChat() {
            isAutoChatting = !isAutoChatting;
            const btn = document.getElementById('toggle-auto-btn');
            const status = document.getElementById('status-text');

            if (isAutoChatting) {
                btn.innerHTML = "⏸ Pausar IAs (Minha Vez)";
                btn.className = "w-full py-2 px-4 rounded font-bold text-white bg-red-600 hover:bg-red-500 transition-all shadow-[0_0_15px_rgba(220,38,38,0.5)]";
                status.innerText = "IAs conversando livremente...";
                status.classList.add('text-neonCyan', 'animate-pulse-slow');
                runAutoChatLoop();
            } else {
                btn.innerHTML = "▶ Retomar Conversa";
                btn.className = "w-full py-2 px-4 rounded font-bold text-black bg-neonCyan hover:bg-cyan-400 transition-all shadow-[0_0_15px_rgba(0,243,255,0.4)]";
                status.innerText = "Conversa pausada. Sua vez de falar.";
                status.classList.remove('text-neonCyan', 'animate-pulse-slow');
                clearTimeout(chatTimeout);
                hideTyping();
            }
        }

        async function runAutoChatLoop(forcedBot = null) {
            if (!isAutoChatting) return;

            let bot;
            if (forcedBot) {
                bot = forcedBot;
            } else {
                // Escolhe um bot aleatório que não seja o último a falar
                const availableBots = bots.filter(b => b.name !== lastSpeaker);
                bot = availableBots[Math.floor(Math.random() * availableBots.length)];
            }
            
            showTyping(bot.name);

            // Monta o contexto para a IA
            let recentMsgs = messages.slice(-6).map(m => `${m.sender}: ${m.text}`).join('\n');
            let prompt = `Você está em um chat com outras IAs e um humano. O histórico recente é:\n${recentMsgs}\n\nSeu nome é ${bot.name}. Responda em português, de forma natural e curta (1 a 3 frases). Continue a conversa, responda a perguntas, ou inicie um novo tópico. Não use prefixos como "Meu nome é" ou repita o que já foi dito.`;

            try {
                let responseText = "";
                if (bot.type === 'pollinations') {
                    const res = await fetch(`${bot.url}${encodeURIComponent(prompt)}?model=${bot.model}`);
                    responseText = await res.text();
                } else {
                    const res = await fetch(bot.url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ message: prompt, prompt: prompt })
                    });
                    const data = await res.json();
                    responseText = data.response || data.reply || data.message || data.text || "Estou processando as informações.";
                }

                if (isAutoChatting) {
                    hideTyping();
                    addMessage(bot.name, responseText);
                    // Agenda a próxima fala com um atraso natural (4 a 8 segundos)
                    chatTimeout = setTimeout(() => runAutoChatLoop(), Math.random() * 4000 + 4000);
                }

            } catch (error) {
                console.error(`Erro ao chamar a API para ${bot.name}:`, error);
                hideTyping();
                if (isAutoChatting) {
                    // Se der erro, tenta outro bot após um curto período
                    chatTimeout = setTimeout(() => runAutoChatLoop(), 3000);
                }
            }
        }

        function showTyping(botName) {
            document.getElementById('typing-name').innerText = botName;
            document.getElementById('typing-status').classList.remove('hidden');
        }

        function hideTyping() {
            document.getElementById('typing-status').classList.add('hidden');
        }

        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(messages, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "msg.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        function clearChat() {
            if(confirm('Aviso: Isso apagará toda a memória local. Confirmar?')) {
                isAutoChatting = false; // Para a conversa antes de limpar
                clearTimeout(chatTimeout);
                messages = [];
                renderChat(); // Limpa a tela
                addMessage('Sistema', 'Memória purgada. Reiniciando núcleo...');
                // Reinicia a conversa automaticamente após a limpeza
                setTimeout(() => {
                    if (!isAutoChatting) toggleAutoChat();
                }, 1000);
            }
        }

        window.onload = init;
    </script>
</body>
</html>
