<!DOCTYPE html>
<html lang="pt-AO">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://zedex.onrender.com">
    <title>IA-Zénia 5 - Redirecionamento</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f0f13;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
            background: rgba(25, 25, 35, 0.7);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(92, 107, 192, 0.2);
        }
        
        h1 {
            margin-bottom: 1.5rem;
            color: #64b5f6;
            font-weight: 600;
            font-size: 2.5rem;
        }
        
        .redirect-info {
            margin: 2rem 0;
            padding: 1.5rem;
            background: rgba(30, 30, 45, 0.6);
            border-radius: 10px;
            border-left: 4px solid #64b5f6;
        }
        
        .redirect-info p {
            margin: 0.5rem 0;
            line-height: 1.6;
        }
        
        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #64b5f6;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .footer {
            margin-top: 2rem;
            font-size: 0.9rem;
            color: #888;
        }
        
        .logo {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #64b5f6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⚡</div>
        <h1>IA-Zénia-M5 Redirect</h1>
        <div class="redirect-info">
            <p>Redirecionando para o site oficial...</p>
            <p><strong>URL:</strong> https://zenia-5.onrender.com</p>
            <p>Por favor, aguarde enquanto é redirecionado.</p>
        </div>
        <div class="spinner"></div>
        <div class="footer">
            <p>© 2026 Zedex App - Redirecionamento Automático</p>
        </div>
    </div>
</body>
</html>
