<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenia IA - Wikimedia + Imagens</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg-primary:#0f172a; --bg-secondary:#1e293b;
  --bg-tertiary:#334155; --text-primary:#f1f5f9;
  --text-secondary:#94a3b8; --border:#334155;
}
body.light{--bg-primary:#f8fafc; --bg-secondary:#ffffff; --bg-tertiary:#f1f5f9;
--text-primary:#1e293b; --text-secondary:#64748b; --border:#e2e8f0;}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:var(--bg-primary);
color:var(--text-primary); transition:all 0.3s ease;}
.header{background:var(--bg-secondary); border-bottom:1px solid var(--border); padding:1rem 2rem;}
.header-content{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;}
.logo{display:flex;align-items:center;gap:1rem;}
.logo-icon{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); width:50px;height:50px; border-radius:12px; display:flex;align-items:center;justify-content:center; font-size:28px;}
.logo-text h1{font-size:1.5rem;margin-bottom:2px;}
.logo-text p{font-size:0.85rem;color:var(--text-secondary);}
.header-actions{display:flex;gap:0.5rem;}
.icon-btn{background:var(--bg-tertiary);border:none;padding:0.75rem;border-radius:8px;cursor:pointer;font-size:1.2rem;transition:all 0.3s;}
.icon-btn:hover{transform:translateY(-2px);}
.container{max-width:1400px;margin:2rem auto;padding:0 2rem;display:grid;grid-template-columns:300px 1fr;gap:2rem;}
.sidebar{display:flex;flex-direction:column;gap:1rem;}
.stats-card,.modules-card,.info-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:1.5rem;}
.stats-card h3,.modules-card h3,.info-card h3{font-size:0.9rem;color:var(--text-secondary);margin-bottom:1rem;}
.stat-item{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;font-size:0.9rem;}
.module-item{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;font-size:0.85rem;}
.status-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.info-card p{font-size:0.85rem;line-height:1.8;color:var(--text-secondary);}
.chat-container{background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;height:calc(100vh - 200px);}
.messages{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;}
.message{display:flex;animation:slideIn 0.3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.message.user{justify-content:flex-end;}
.message-content{max-width:70%;padding:1rem 1.25rem;border-radius:12px;line-height:1.6;}
.message.bot .message-content{background:var(--bg-tertiary);}
.message.user .message-content{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white;}
.thinking{display:flex;gap:5px;padding:1rem;}
.thinking-dot{width:8px;height:8px;background:var(--text-secondary);border-radius:50%;animation:bounce 1.4s infinite ease-in-out;}
.thinking-dot:nth-child(1){animation-delay:-0.32s;}
.thinking-dot:nth-child(2){animation-delay:-0.16s;}
@keyframes bounce{0%,80%,100%{transform:scale(0);}40%{transform:scale(1);}}
.input-container{border-top:1px solid var(--border);padding:1.5rem;display:flex;gap:1rem;}
#userInput{flex:1;padding:0.75rem 1rem;border:1px solid var(--border);border-radius:8px;background:var(--bg-tertiary);color:var(--text-primary);font-size:1rem;}
#userInput:focus{outline:none;border-color:#667eea;}
#sendBtn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border:none;padding:0.75rem 2rem;border-radius:8px;color:white;font-size:1.2rem;cursor:pointer;transition:opacity 0.3s;}
#sendBtn:hover{opacity:0.9;}
#sendBtn:disabled{opacity:0.5;cursor:not-allowed;}
@media(max-width:768px){.container{grid-template-columns:1fr;}.sidebar{order:2;}}
</style>
</head>
<body>
<div id="app">
<header class="header">
<div class="header-content">
<div class="logo"><div class="logo-icon">🧠</div>
<div class="logo-text"><h1>Zenia IA</h1><p>Sistema Inteligente + Wikimedia</p></div></div>
<div class="header-actions">
<button id="exportBtn" class="icon-btn" title="Exportar dados">💾</button>
<button id="clearBtn" class="icon-btn" title="Limpar chat">🗑️</button>
<button id="themeBtn" class="icon-btn" title="Alternar tema">🌙</button>
<input type="file" id="imgInput" accept="image/*" class="icon-btn" title="Enviar imagem">📷
</div></div>
</header>

<div class="container">
<aside class="sidebar">
<div class="stats-card">
<h3>Estatísticas</h3>
<div class="stat-item"><span>⚡</span> Interações: <strong id="interactions">0</strong></div>
<div class="stat-item"><span>💾</span> Respostas: <strong id="learned">0</strong></div>
<div class="stat-item"><span>⚙️</span> Contexto: <strong id="contextSize">0</strong></div>
</div>

<div class="modules-card">
<h3>Módulos Ativos</h3>
<div class="module-item"><span class="status-dot"></span> Contexto</div>
<div class="module-item"><span class="status-dot"></span> Wikimedia</div>
<div class="module-item"><span class="status-dot"></span> Análise de Imagens</div>
</div>

<div class="info-card">
<h3>Como usar</h3>
<p>• Converse normalmente<br>• Pergunte qualquer coisa<br>• Envie imagens para descrição<br>• Zenia fala o resultado para cegos</p>
</div>
</aside>

<main class="chat-container">
<div id="messages" class="messages"></div>
<div class="input-container">
<input type="text" id="userInput" placeholder="Digite sua mensagem...">
<button id="sendBtn">📤</button>
</div>
</main>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.12.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<script>
// ======== Variáveis ========
let LocalData = [];
let ContextModule = { context: [], maxSize: 10, add(u,b){this.context.push({user:u,bot:b}); if(this.context.length>this.maxSize)this.context.shift();}, size(){return this.context.length;}, clear(){this.context=[];}};
let stats = { interactions:0, learned:0};
let isThinking = false;
let model = null;

// ======== Carregar base local ========
fetch('/dilexconversation_knowledge.json')
  .then(r => r.json())
  .then(d => { LocalData = d; console.log("Base local carregada:", LocalData.length); })
  .catch(()=>{console.warn("Base local não carregou");});

// ======== Wikimedia API ========
async function searchWikimedia(q){
    try{
        const url = `https://pt.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`;
        const r = await fetch(url);
        if(!r.ok) return null;
        const d = await r.json();
        return d.extract || null;
    }catch(e){console.error(e); return null;}
}

// ======== Funções de Mensagem ========
function addUserMessage(t){const m=document.createElement('div');m.className='message user';m.innerHTML=`<div class="message-content">${t}</div>`;messages.appendChild(m);messages.scrollTop=messages.scrollHeight; speak(t);}
function addBotMessage(t){const m=document.createElement('div');m.className='message bot';m.innerHTML=`<div class="message-content">${t}</div>`;messages.appendChild(m);messages.scrollTop=messages.scrollHeight; speak(t);}
function showThinking(){const d=document.createElement('div');d.className='message bot';d.id='thinking';d.innerHTML=`<div class="message-content thinking"><div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div></div>`;messages.appendChild(d);messages.scrollTop=messages.scrollHeight;}
function removeThinking(){const t=document.getElementById('thinking');if(t)t.remove();}
function updateStats(){interactions.textContent=stats.interactions;learned.textContent=stats.learned;contextSize.textContent=ContextModule.size();}

// ======== Resposta Inteligente ========
async function generateResponse(text){
    // 1. Ver base local
    const local = LocalData.find(item => item.prompt.toLowerCase() === text.toLowerCase());
    if(local) return local.response;

    // 2. Wikimedia
    const wiki = await searchWikimedia(text);
    if(wiki) return `📚 Encontrei isto na Wikipedia: ${wiki}`;

    return "Não sei responder a isso 😅";
}

// ======== Envio de Mensagem ========
async function sendMessage(){
    const msg = userInput.value.trim();
    if(!msg || isThinking) return;
    addUserMessage(msg);
    userInput.value = '';
    isThinking = true;
    sendBtn.disabled = true;
    showThinking();

    const response = await generateResponse(msg);
    removeThinking();
    addBotMessage(response);

    ContextModule.add(msg,response);
    stats.interactions++;
    stats.learned++; // conta respostas
    updateStats();
    isThinking = false;
    sendBtn.disabled = false;
    userInput.focus();
}

// ======== Fala (TTS) ========
function speak(text){
    if('speechSynthesis' in window){
        const utter = new SpeechSynthesisUtterance(text);
        utter.lang='pt-PT';
        speechSynthesis.speak(utter);
    }
}

// ======== Carregar modelo de imagens ========
cocoSsd.load().then(m => { model = m; console.log("Modelo de imagens pronto"); });

// ======== Análise de imagem ========
imgInput.onchange = async function(e){
    if(!model){ addBotMessage("Modelo de imagens ainda não carregado."); return; }
    const file = e.target.files[0];
    if(!file) return;
    const img = new Image();
    img.src = URL.createObjectURL(file);
    img.crossOrigin='anonymous';
    img.style.display='none';
    document.body.appendChild(img);
    img.onload = async () => {
        const predictions = await model.detect(img);
        if(predictions.length === 0){
            addBotMessage("Não consegui identificar objetos ou pessoas na imagem.");
        } else {
            const desc = predictions.map(p => `${p.class} (${(p.score*100).toFixed(0)}%)`).join(', ');
            addBotMessage("Descrição da imagem: " + desc);
        }
        document.body.removeChild(img);
    };
}

// ======== Inicialização ========
document.addEventListener('DOMContentLoaded',()=>{
    addBotMessage("👋 Olá! Sou a Zenia IA. Pergunte algo ou envie uma imagem.");
    sendBtn.onclick = sendMessage;
    userInput.onkeypress = e=>{if(e.key==='Enter') sendMessage();};
    clearBtn.onclick = ()=>{messages.innerHTML=''; ContextModule.clear(); stats={interactions:0,learned:0}; updateStats(); addBotMessage("Chat limpo!");};
    themeBtn.onclick = ()=>{document.body.classList.toggle('light');};
    exportBtn.onclick = ()=>{const data={messages:Array.from(document.querySelectorAll('.message')).map(m=>({type:m.classList.contains('user')?'user':'bot',text:m.textContent})),context:ContextModule.context,stats,exportDate:new Date()}; const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='zenia-data.json'; a.click();}
});
</script>
</body>
</html>
