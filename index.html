<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zenia IA — WebLLM</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:#e6eef8; margin:0; }
    .wrap { max-width:900px; margin:20px auto; display:grid; grid-template-columns:250px 1fr; gap:16px; }
    .card { background:#102235; border-radius:12px; padding:12px; }
    .msg { padding:10px; margin:8px 0; border-radius:10px; max-width:78%; }
    .msg.user { background:rgba(125,179,255,0.12); color:#021124; margin-left:auto; }
    .msg.zenia { background:rgba(255,255,255,0.05); }
    button { padding:8px 12px; border:none; border-radius:8px; background:linear-gradient(90deg,#7c3aed,#06b6d4); color:white; cursor:pointer; }
    input { flex:1; padding:8px; border-radius:8px; border:1px solid rgba(255,255,255,0.1); background:transparent; color:#e6eef8; }
    .controls { display:flex; gap:8px; }
    #status { font-size:13px; color:#94a3b8; margin-top:8px; }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="card">
      <h3>Zenia IA</h3>
      <div id="status">Status: inicializando...</div>
      <button id="clearBtn" style="margin-top:10px;width:100%">Limpar conversa</button>
    </aside>
    <main class="card">
      <div class="controls">
        <input id="userInput" type="text" placeholder="Pergunte algo..." />
        <button id="sendBtn">Enviar</button>
      </div>
      <div id="chatArea"></div>
    </main>
  </div>

  <!-- ✅ versão global do WebLLM -->
  <script src="https://unpkg.com/webllm@0.0.1/dist/index.global.js"></script>
  <script src="script.js"></script>
</body>
</html>
