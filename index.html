<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zenia — by @inacio.u.daniel (Wikimedia) v2</title>
  <style>
    :root{
      --bg:#0f172a; --card:#102235; --accent1:#7c3aed; --accent2:#06b6d4;
      --text:#e6eef8; --muted:#94a3b8;
    }
    *{box-sizing:border-box}
    body{font-family:Inter,system-ui,Arial;margin:0;background:var(--bg);color:var(--text)}
    .wrap{max-width:1100px;margin:18px auto;display:grid;grid-template-columns:320px 1fr;gap:16px;padding:0 16px}
    .card{background:var(--card);border-radius:12px;padding:12px;border:1px solid rgba(255,255,255,0.06)}
    .logo{display:flex;gap:10px;align-items:center}
    .logo-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;background:linear-gradient(135deg,var(--accent1),#764ba2)}
    .small{font-size:13px;color:var(--muted)}
    .controls{display:flex;gap:8px;align-items:center;margin-bottom:10px}
    #chatArea{height:60vh; overflow:auto; padding:10px; background:linear-gradient(180deg, rgba(255,255,255,0.015), transparent); border-radius:8px}
    .msg{padding:10px;margin:8px 0;border-radius:10px;max-width:78%}
    .msg.user{background:rgba(125,179,255,0.12); color:#021124; margin-left:auto}
    .msg.zenia{background:rgba(255,255,255,0.06)}
    input[type="text"], select {flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:var(--text)}
    button{padding:9px 12px;border-radius:8px;border:none;background:linear-gradient(90deg,var(--accent1),var(--accent2));color:white;cursor:pointer}
    #status {font-size:13px;color:var(--muted);margin-top:8px}
    .progress{height:8px;background:#0b1320;border-radius:999px;overflow:hidden;margin-top:8px}
    .progress > i{display:block;height:100%;width:0%;background:linear-gradient(90deg,var(--accent1),var(--accent2));transition:width .2s}
    .toolbox{display:flex;gap:8px;margin-top:10px}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="card">
      <div class="logo">
        <div class="logo-icon">🧠</div>
        <div>
          <div style="font-weight:700">Zenia by @inacio.u.daniel</div>
          <div class="small">Conversa natural com Wikimedia</div>
        </div>
      </div>

      <hr style="margin:10px 0;border:none;border-top:1px solid rgba(255,255,255,0.12)">

      <div>
        <label class="small">Idioma</label>
        <select id="langSelect" style="width:100%;margin-top:6px">
          <option value="pt" selected>Português (pt)</option>
          <option value="en">English (en)</option>
          <option value="es">Español (es)</option>
        </select>
      </div>

      <div id="status" style="margin-top:12px">Status: pronto</div>
      <div class="progress" aria-hidden><i id="modelProgress"></i></div>

      <div class="toolbox">
        <button id="micBtn" title="Falar">🎤 Falar</button>
        <button id="ttsBtn" title="Ler resposta">🔊 Ler</button>
      </div>

      <div class="toolbox">
        <button id="openImageGen">🖼️ Gerador de imagens</button>
        <button id="openVideoGen">🎬 Gerador de vídeos</button>
      </div>

      <div style="margin-top:8px">
        <button id="clearBtn" style="width:100%">Limpar conversa</button>
      </div>
    </aside>

    <main class="card">
      <div class="controls">
        <input id="userInput" type="text" placeholder="Converse com a Zenia (ex: Olá, como vai?)" />
        <button id="sendBtn">Enviar</button>
      </div>

      <div id="chatArea" role="log" aria-live="polite"></div>
    </main>
  </div>

  <script src="script.js"></script>
</body>
</html>
