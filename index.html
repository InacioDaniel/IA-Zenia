<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Zenia IA - Mangolé (Imagens + Ficheiros + Voz + Tradução)</title>
<link rel="shortcut icon" href="favicon.png" type="image/x-icon">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg-primary:#0f172a; --bg-secondary:#1e293b;
  --bg-tertiary:#334155; --text-primary:#f1f5f9;
  --text-secondary:#94a3b8; --border:#334155;
}
body.light{--bg-primary:#f8fafc; --bg-secondary:#ffffff; --bg-tertiary:#f1f5f9;
--text-primary:#1e293b; --text-secondary:#64748b; --border:#e2e8f0;}
body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif; background:var(--bg-primary);
color:var(--text-primary); transition:all 0.3s ease;}
.header{background:var(--bg-secondary); border-bottom:1px solid var(--border); padding:1rem 2rem; display:flex;justify-content:space-between;align-items:center;}
.logo{display:flex;align-items:center;gap:1rem;}
.logo-icon{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); width:50px;height:50px; border-radius:12px; display:flex;align-items:center;justify-content:center; font-size:28px;}
.logo-text h1{font-size:1.5rem;margin-bottom:2px;}
.logo-text p{font-size:0.85rem;color:var(--text-secondary);}
.header-actions{display:flex;gap:0.5rem;}
.icon-btn{background:var(--bg-tertiary);border:none;padding:0.75rem;border-radius:8px;cursor:pointer;font-size:1.2rem;transition:all 0.3s;}
.icon-btn:hover{transform:translateY(-2px);}
.container{max-width:1400px;margin:2rem auto;padding:0 2rem;display:grid;grid-template-columns:300px 1fr;gap:2rem;}
.sidebar{display:flex;flex-direction:column;gap:1rem;}
.card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;padding:1.5rem;}
.card h3{font-size:0.9rem;color:var(--text-secondary);margin-bottom:1rem;}
.stat,.module-item{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;font-size:0.9rem;}
.status-dot{width:8px;height:8px;background:#22c55e;border-radius:50%;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}
.chat-window{background:var(--bg-secondary);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;height:70vh;overflow:hidden;}
.messages{flex:1;overflow-y:auto;padding:1.5rem;display:flex;flex-direction:column;gap:1rem;}
.message{display:flex;animation:slideIn 0.3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.message.user{justify-content:flex-end;}
.message-content{max-width:70%;padding:1rem 1.25rem;border-radius:12px;line-height:1.6;}
.message.bot .message-content{background:var(--bg-tertiary);}
.message.user .message-content{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white;}
.thinking{display:flex;gap:5px;padding:1rem;}
.thinking-dot{width:8px;height:8px;background:var(--text-secondary);border-radius:50%;animation:bounce 1.4s infinite ease-in-out;}
.thinking-dot:nth-child(1){animation-delay:-0.32s;}
.thinking-dot:nth-child(2){animation-delay:-0.16s;}
@keyframes bounce{0%,80%,100%{transform:scale(0);}40%{transform:scale(1);}}
.input-container{border-top:1px solid var(--border);padding:1.5rem;display:flex;gap:1rem;}
#userInput{flex:1;padding:0.75rem 1rem;border:1px solid var(--border);border-radius:8px;background:var(--bg-tertiary);color:var(--text-primary);font-size:1rem;}
#userInput:focus{outline:none;border-color:#667eea;}
#sendBtn{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);border:none;padding:0.75rem 2rem;border-radius:8px;color:white;font-size:1.2rem;cursor:pointer;transition:opacity 0.3s;}
#sendBtn:hover{opacity:0.9;}
#sendBtn:disabled{opacity:0.5;cursor:not-allowed;}
@media(max-width:768px){.container{grid-template-columns:1fr;}.sidebar{order:2;}}
</style>
</head>
<body>
<header class="header">
  <div class="logo">
    <div class="logo-icon">🤖</div>
    <div class="logo-text">
      <h1>Zenia IA</h1>
      <p>Mangolé Edition — by @inacio.u.daniel</p>
    </div>
  </div>
  <div class="header-actions">
    <label class="icon-btn" title="Carregar ficheiro">
      📂
      <input id="fileReaderInput" class="file-input-hidden" type="file" />
    </label>
    <button id="exportBtn" class="icon-btn" title="Exportar">💾</button>
    <button id="themeBtn" class="icon-btn" title="Tema claro/escuro">🌗</button>
    <button id="cameraToggleHeader" class="icon-btn" title="Câmera">📷</button>
  </div>
</header>

<div class="container">
  <aside class="sidebar">
    <div class="card">
      <h3>Estado</h3>
      <div class="stat">Interações: <strong id="interactions">0</strong></div>
      <div class="stat">Respostas: <strong id="learned">0</strong></div>
      <div class="stat">Câmera: <strong id="camStatus">Desligada</strong></div>
    </div>
    <div class="card">
      <h3>Módulos ativos</h3>
      <div class="module-item"><span class="status-dot"></span>Base Local</div>
      <div class="module-item"><span class="status-dot"></span>Wikimedia</div>
      <div class="module-item"><span class="status-dot"></span>Visão Computacional</div>
      <div class="module-item"><span class="status-dot"></span>Tradução Automática</div>
      <div class="module-item"><span class="status-dot"></span>Reconhecimento de Voz</div>
      <div class="module-item"><span class="status-dot"></span>Lint JS</div>
    </div>
  </aside>

  <main>
    <div id="cameraContainer" class="card" style="display:none; margin-bottom:12px;">
      <div id="detectedLabel">Aguardando...</div>
      <video id="camera" autoplay muted playsinline style="width:100%;border-radius:8px;"></video>
    </div>

    <section class="chat-window">
      <div id="messages" class="messages"></div>
      <div class="input-container">
        <input id="userInput" type="text" placeholder="Escreve aqui..." />
        <button id="sendBtn">📤</button>
      </div>
    </section>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.12.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<script>
let LocalData=[], FallbackBase=[
  {prompt:"o que é ia", response:"IA é a capacidade de máquinas aprenderem e resolverem problemas."},
  {prompt:"quem criou a zenia", response:"Fui criada por Inácio U. Daniel — Mangolé power! 🇦🇴"}
];
let model=null, stream=null, cameraOn=false, lastDetected="", speakEnabled=true, interactions=0, learned=0;
const messagesDiv=document.getElementById('messages');

function speak(text){
  if(!speakEnabled||!('speechSynthesis'in window)) return;
  if(window.speechSynthesis.speaking) window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text); u.lang='pt-PT'; u.rate=1; window.speechSynthesis.speak(u);
}

function appendMessage(who,text,thinking=false){
  const el=document.createElement('div'); el.className=`message ${who}`;
  if(thinking){el.innerHTML='<div class="thinking"><div class="thinking-dot"></div><div class="thinking-dot"></div></div>';}
  else el.innerHTML=`<div class="message-content">${text}</div>`;
  messagesDiv.appendChild(el); messagesDiv.scrollTop=messagesDiv.scrollHeight;
  if(who==='bot'&&!thinking) speak(text.replace(/<[^>]+>/g,''));
  return el;
}

const userInput=document.getElementById('userInput');
document.getElementById('sendBtn').addEventListener('click',handleSend);
userInput.addEventListener('keypress',e=>{if(e.key==='Enter'){e.preventDefault();handleSend();}});

async function handleSend(){
  const text=userInput.value.trim(); if(!text) return;
  appendMessage('user',text); userInput.value='';
  interactions++; updateStats();
  const thinkingEl=appendMessage('bot','',true);
  let resp=await generateResponse(text);
  resp=await translateText(resp);
  thinkingEl.remove();
  appendMessage('bot',resp);
  learned++; updateStats();
}

async function generateResponse(text){
  const t=text.toLowerCase();
  const found=LocalData.find(i=>t.includes(i.prompt.toLowerCase()));
  return found?found.response:"Ainda não sei responder. Podes enviar um ficheiro ou explicar.";
}

function updateStats(){
  document.getElementById('interactions').textContent=interactions;
  document.getElementById('learned').textContent=learned;
}

async function translateText(text){
  try{
    const res=await fetch('https://api.mymemory.translated.net/get?q='+encodeURIComponent(text)+'&langpair=auto|pt');
    const j=await res.json(); return j.responseData.translatedText||text;
  }catch(e){return text;}
}

/* --- Câmera --- */
const cameraContainer=document.getElementById('cameraContainer');
const cameraEl=document.getElementById('camera');
const detectedLabel=document.getElementById('detectedLabel');
document.getElementById('cameraToggleHeader').addEventListener('click',toggleCamera);

async function toggleCamera(){
  if(cameraOn){stream.getTracks().forEach(t=>t.stop());cameraEl.srcObject=null;cameraContainer.style.display='none';cameraOn=false;return;}
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'},audio:false});
    cameraEl.srcObject=stream; cameraContainer.style.display='block';cameraOn=true;
    if(!model) model=await cocoSsd.load(); detectLoop();
  }catch(e){appendMessage('bot','Não consegui aceder à câmera.')}
}

async function detectLoop(){
  if(!cameraOn||!model) return;
  const preds=await model.detect(cameraEl);
  if(preds?.length>0){
    const unique=[...new Set(preds.map(p=>p.class))].slice(0,5);
    const outText=unique.join(', ')||'Nada detectado';
    detectedLabel.textContent=outText;
    if(outText!==lastDetected){lastDetected=outText;speak(outText);}
  }else{detectedLabel.textContent='Nada detectado';lastDetected='Nada detectado';}
  if(cameraOn) requestAnimationFrame(detectLoop);
}
</script>
</body>
</html>
