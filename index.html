<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Zenia IA - by @inacio.u.daniel</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0f172a;
  color:#e6eef8;
}
.header{
  padding:1rem;
  background:#020617;
}
.container{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:1rem;
  padding:1rem;
}
.card{
  background:#020617;
  padding:1rem;
  border-radius:10px;
}
.chat{
  display:flex;
  flex-direction:column;
  height:80vh;
}
#video{
  width:100%;
  height:260px;
  background:black;
  display:none;
}
.messages{
  flex:1;
  overflow:auto;
  padding:.5rem;
}
.msg{
  margin:.3rem 0;
  padding:.4rem .6rem;
  border-radius:6px;
  background:#1e293b;
}
.bot{background:#312e81}
.input{
  display:flex;
}
input{
  flex:1;
  padding:.5rem;
}
button{
  padding:.5rem;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <strong>🧠 Zenia IA</strong>
</div>

<div class="container">

<aside class="card">
  <p><strong>Autor:</strong> @inacio.u.daniel</p>
  <p>Interações: <span id="count">0</span></p>
  <button id="cameraBtn">📷 Câmera</button>
  <button id="stopBtn">⛔ Parar</button>
</aside>

<main class="card chat">
  <video id="video" autoplay muted playsinline></video>
  <div class="messages" id="messages"></div>
  <div class="input">
    <input id="input" placeholder="Digite..." />
    <button id="send">Enviar</button>
  </div>
</main>

</div>

<script>
let interactions = 0;
let stream = null;

const messages = document.getElementById("messages");
const input = document.getElementById("input");
const count = document.getElementById("count");
const video = document.getElementById("video");

/* ===== NLP SIMPLES ===== */
async function getBotReply(text){
  text = text.toLowerCase();

  if(text.includes("oi") || text.includes("olá"))
    return "👋 Olá! Sou a Zenia IA.";

  if(/\d+.*[\+\-\*\/].*\d+/.test(text)){
    try{
      return "🧮 Resultado: " + Function("return "+text)();
    }catch{
      return "Erro no cálculo.";
    }
  }

  try{
    const res = await fetch(
      "https://pt.wikipedia.org/api/rest_v1/page/summary/" +
      encodeURIComponent(text)
    );
    const data = await res.json();
    if(data.extract) return data.extract.slice(0,400)+"...";
  }catch{}

  return "🤖 Ainda estou a aprender.";
}

/* ===== UI ===== */
function addMsg(text, cls){
  const div = document.createElement("div");
  div.className = "msg "+cls;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

/* ===== ENVIAR ===== */
document.getElementById("send").onclick = async ()=>{
  if(!input.value) return;
  addMsg(input.value,"user");
  const reply = await getBotReply(input.value);
  addMsg(reply,"bot");
  input.value="";
  interactions++;
  count.textContent = interactions;
};

input.addEventListener("keydown",e=>{
  if(e.key==="Enter") document.getElementById("send").click();
});

/* ===== CÂMERA ===== */
document.getElementById("cameraBtn").onclick = async ()=>{
  stream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject = stream;
  video.style.display="block";
};

document.getElementById("stopBtn").onclick = ()=>{
  if(stream){
    stream.getTracks().forEach(t=>t.stop());
    video.style.display="none";
  }
};
</script>

</body>
</html>
