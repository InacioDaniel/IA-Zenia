<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenia IA - Kamba Digital</title>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
<style>
  body{font-family:Arial;background:#121212;color:white;margin:0;display:flex;flex-direction:column;height:100vh;}
  header{background:#222;padding:10px;text-align:center;font-size:20px;font-weight:bold;}
  #messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:8px;}
  .message{max-width:80%;padding:10px;border-radius:10px;}
  .user{align-self:flex-end;background:#007bff;color:#fff;}
  .bot{align-self:flex-start;background:#333;}
  #inputArea{display:flex;align-items:center;padding:8px;background:#1e1e1e;}
  #userInput{flex:1;padding:10px;border:none;border-radius:5px;}
  button{margin-left:5px;padding:10px;border:none;border-radius:5px;cursor:pointer;}
  #attachBtn{background:#555;color:white;}
  #fileBtn{background:#666;color:white;}
  #voiceBtn{background:#008000;color:white;}
  #imageLabel{display:block;text-align:center;font-size:14px;margin-top:4px;}
  #imagePreview{max-width:150px;margin:8px auto;display:block;border-radius:8px;}
  #detectedObj{position:absolute;top:65px;left:50%;transform:translateX(-50%);background:#0008;color:#fff;padding:5px 12px;border-radius:8px;}
</style>
</head>
<body>
<header>Zenia IA 🤖 - Kamba Digital</header>
<div id="detectedObj" hidden></div>
<div id="messages" role="log" aria-live="polite"></div>
<div id="inputArea">
  <input id="userInput" type="text" placeholder="Fala comigo kamba..." aria-label="Caixa de texto principal">
  <button id="attachBtn">📎</button>
  <button id="fileBtn">📄</button>
  <button id="voiceBtn" title="Ler voz">🔊</button>
</div>

<script>
let LocalData=[], model=null, voiceEnabled=true;
const messages=document.getElementById("messages");
const input=document.getElementById("userInput");
const voiceBtn=document.getElementById("voiceBtn");
const detectedObj=document.getElementById("detectedObj");

// ==== Inicialização ====
window.onload=async()=>{
  try{
    const r=await fetch('/dilexconversation_knowledge.json');
    LocalData=await r.json();
    console.log("Base local carregada:",LocalData.length);
  }catch{console.warn("Base local não encontrada.");}
  model=await cocoSsd.load();
  console.log("Modelo Coco-SSD pronto!");
};

// ==== TTS ====
function speak(txt){
  if(!voiceEnabled)return;
  const u=new SpeechSynthesisUtterance(txt);
  u.lang='pt-PT';
  speechSynthesis.speak(u);
}
voiceBtn.onclick=()=>{voiceEnabled=!voiceEnabled;voiceBtn.style.opacity=voiceEnabled?'1':'0.5';};

// ==== Envio ====
input.addEventListener("keydown",e=>{
  if(e.ctrlKey&&e.key==="Enter")sendMessage();
});
document.addEventListener("keydown",e=>{
  if(e.ctrlKey&&e.key.toLowerCase()==="l"){messages.innerHTML='';addBotMessage("Chat limpo!");}
  if(e.ctrlKey&&e.key.toLowerCase()==="v"){voiceBtn.click();}
  if(e.ctrlKey&&e.key.toLowerCase()==="i"){attachBtn.click();}
  if(e.ctrlKey&&e.key.toLowerCase()==="f"){fileBtn.click();}
});

function addUserMessage(t){
  const m=document.createElement('div');
  m.className='message user';
  m.innerHTML=t;
  messages.appendChild(m);
  messages.scrollTop=messages.scrollHeight;
}
function addBotMessage(t){
  const m=document.createElement('div');
  m.className='message bot';
  m.innerHTML=t;
  messages.appendChild(m);
  messages.scrollTop=messages.scrollHeight;
  speak(t);
}

// ==== Enviar mensagem ====
async function sendMessage(){
  const text=input.value.trim();
  if(!text)return;
  addUserMessage(text);
  input.value='';
  const resp=await generateResponse(text);
  addBotMessage(resp);
}

// ==== Resposta ====
async function generateResponse(msg){
  msg=msg.toLowerCase();

  // Saudações
  if(["oi","olá","ola","yo","boas","bom dia","boa tarde","boa noite"].some(p=>msg.includes(p))){
    const respostas=[
      "Oi meu kamba! Tudo nice contigo? 😄",
      "Olá! Tás firme? 👋",
      "Boas! Bora conversar um pouco? 😎",
      "Bom dia! Que o sol te dê boas vibrações ☀️",
      "Boa tarde! Tudo controlado?",
      "Boa noite! Relaxa e vamos papiar 💬"
    ];
    return respostas[Math.floor(Math.random()*respostas.length)];
  }

  // Despedidas
  if(["tchau","xau","fui","adeus","até logo","bye"].some(p=>msg.includes(p))){
    const res=[
      "Tchau kamba! Cuida-te 😎",
      "Até já! Vou sentir tua falta 😂",
      "Fui, mas volto já agora! 👋",
      "Xau! Não desaparece ya?"
    ];
    return res[Math.floor(Math.random()*res.length)];
  }

  // Base local
  const item=LocalData.find(i=>msg.includes(i.prompt.toLowerCase()));
  if(item)return item.response;

  // Wikipedia simples
  const wiki=await searchWikimedia(msg);
  if(wiki)return "📘 "+wiki;

  // Conversas aleatórias estilo angolano
  const aleatorias=[
    "Hehe ya, concordo contigo nisso 😅",
    "Kamba, isso que disseste é mesmo verdade!",
    "Não sei bem, mas parece interessante 🤔",
    "Ya, já ouvi essa história também!",
    "Mano, explica lá melhor essa cena 😄"
  ];
  return aleatorias[Math.floor(Math.random()*aleatorias.length)];
}

// ==== Wikipedia ====
async function searchWikimedia(q){
  try{
    const url=`https://pt.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(q)}`;
    const r=await fetch(url);
    const d=await r.json();
    return d.extract || null;
  }catch{return null;}
}

// ==== Anexo imagem ====
const attachBtn=document.getElementById('attachBtn');
attachBtn.onclick=()=>{
  const inputFile=document.createElement('input');
  inputFile.type='file';
  inputFile.accept='image/*';
  inputFile.onchange=e=>handleImage(e.target.files[0]);
  inputFile.click();
};

// ==== Análise de imagem ====
async function handleImage(file){
  if(!model){addBotMessage("O modelo ainda não tá pronto.");return;}
  const img=new Image();
  img.src=URL.createObjectURL(file);
  img.style.display='none';
  document.body.appendChild(img);
  img.onload=async()=>{
    const preds=await model.detect(img);
    document.body.removeChild(img);
    if(preds.length===0){
      detectedObj.hidden=false;
      detectedObj.innerText="Nada reconhecido";
      setTimeout(()=>detectedObj.hidden=true,3000);
      addBotMessage("Não consegui identificar nada na imagem 😅");
      return;
    }
    const top=preds[0];
    detectedObj.hidden=false;
    detectedObj.innerText=`${top.class} (${(top.score*100).toFixed(0)}%)`;
    setTimeout(()=>detectedObj.hidden=true,4000);
    addBotMessage(`Parece que vejo ${top.class}, confiança ${(top.score*100).toFixed(1)}%.`);
  };
}

// ==== Leitura de ficheiro ====
const fileBtn=document.getElementById('fileBtn');
fileBtn.onclick=()=>{
  const inputFile=document.createElement('input');
  inputFile.type='file';
  inputFile.accept='.txt,.js,.html,.css,.json,.py,.c,.cpp,.java,.md';
  inputFile.onchange=e=>readFile(e.target.files[0]);
  inputFile.click();
};

function readFile(file){
  const reader=new FileReader();
  reader.onload=()=>{
    const content=reader.result;
    if(file.name.endsWith('.txt')||file.name.endsWith('.md')){
      addBotMessage("📄 Li o ficheiro e parece ser texto. Aqui vai um resumo:\n"+content.slice(0,200)+"...");
    }else{
      addBotMessage("💻 Esse ficheiro parece código ("+file.name+"). Posso tentar explicar o que ele faz:\n"+content.slice(0,200)+"...");
    }
  };
  reader.readAsText(file);
}
</script>
</body>
</html>
