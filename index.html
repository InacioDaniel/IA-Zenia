<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Zenia IA — Chat</title>
  <style>
    :root{
      --bg:#0f172a; --card:#102235; --accent1:#7c3aed; --accent2:#06b6d4; --text:#e6eef8; --muted:#94a3b8;
    }
    body{font-family:Inter,system-ui,Arial; background:var(--bg); color:var(--text); margin:0; padding:0}
    .wrap{max-width:1100px;margin:20px auto;display:grid;grid-template-columns:320px 1fr;gap:16px;padding:0 16px}
    .card{background:var(--card);border-radius:12px;padding:12px;border:1px solid rgba(255,255,255,0.03)}
    .sidebar .logo{display:flex;gap:10px;align-items:center}
    .logo-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;background:linear-gradient(135deg,var(--accent1),#764ba2)}
    .small{font-size:13px;color:var(--muted)}
    .controls{display:flex;gap:8px;align-items:center;margin-bottom:10px}
    #chatArea{height:70vh; overflow:auto; padding:8px; background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent); border-radius:8px}
    .msg.user{background:rgba(125,179,255,0.12); color:#021124; padding:8px; margin:6px 0;border-radius:8px}
    .msg.zenia{background:rgba(255,255,255,0.02); padding:8px; margin:6px 0;border-radius:8px}
    .input-row{display:flex;gap:8px;margin-top:10px}
    input[type="text"]{flex:1;padding:10px;border-radius:8px;border:1px solid rgba(255,255,255,0.03);background:transparent;color:var(--text)}
    button{padding:8px 10px;border-radius:8px;border:none;background:linear-gradient(90deg,var(--accent1),var(--accent2));color:white;cursor:pointer}
    .footer{margin-top:12px;font-size:13px;color:var(--muted)}
    .sources{margin-top:8px;font-size:13px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="sidebar">
      <div class="card">
        <div class="logo">
          <div class="logo-icon">🧠</div>
          <div>
            <div style="font-weight:700">Zenia IA</div>
            <div class="small">by @inacio.u.daniel</div>
          </div>
        </div>
      </div>

      <div class="card">
        <h4>Configurações</h4>
        <div style="margin-top:8px">
          <label class="small">Backend URL (edite para seu servidor)</label>
          <input id="backendUrl" type="text" value="http://localhost:8000" style="width:100%;margin-top:6px;padding:8px;border-radius:6px;background:#0b1624;border:1px solid rgba(255,255,255,0.03);color:var(--text)"/>
          <div class="small" style="margin-top:6px">Você pode definir aqui a URL do backend (FastAPI + Qdrant).</div>
        </div>
      </div>

      <div class="card">
        <h4>Memória</h4>
        <div class="small">Armazenamento: remoto (vector DB)</div>
        <div style="margin-top:8px"><button id="clearLocalBtn">Limpar histórico local</button></div>
      </div>

      <div class="card">
        <div class="footer">Front-end hospedado no Netlify. Backend: servidor próprio com Qdrant + modelo de geração open-source.</div>
      </div>
    </aside>

    <main>
      <div class="card">
        <div class="controls">
          <div style="flex:1">
            <input id="userInput" type="text" placeholder="Pergunte à Zenia (ex: o que é um vulcão?)"/>
          </div>
          <div>
            <button id="sendBtn">Enviar</button>
          </div>
        </div>

        <div id="chatArea"></div>

        <div class="sources" id="sources"></div>
      </div>
    </main>
  </div>

  <!-- Configure backend URL here if you prefer to inject at build time -->
  <script>
    // If you host on Netlify, edit this to point to your backend (e.g., https://zenia-backend.example.com)
    window.BACKEND_URL = window.BACKEND_URL || document.getElementById('backendUrl').value || 'http://localhost:8000';
  </script>

  <script src="script.js"></script>
</body>
</html>
