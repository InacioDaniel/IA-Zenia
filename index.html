<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Zenia IA - Profissional</title>

<style>
body{font-family:Arial;background:#0f172a;color:#e5e7eb;margin:0}
header{background:#020617;padding:12px;font-weight:bold}
main{padding:10px;display:flex;flex-direction:column;height:100vh}
#messages{flex:1;overflow:auto;margin-bottom:10px}
.message{padding:6px 10px;margin:4px 0;border-radius:6px}
.user{background:#1e293b;align-self:flex-end}
.bot{background:#020617}
input,button{padding:8px;border-radius:6px;border:none}
button{cursor:pointer;background:#7c3aed;color:white}
.controls{display:flex;gap:6px}
.mode{font-size:12px;color:#38bdf8}
</style>
</head>

<body>
<header>
ًں§  Zenia IA <span class="mode" id="modeLabel">modo normal</span>
</header>

<main>
<div id="messages"></div>

<div class="controls">
<input id="userInput" placeholder="Digite aqui..." style="flex:1"/>
<button onclick="send()">Enviar</button>
</div>
</main>

<script>
/* ================= MODO ================= */
const ZeniaMode={
  current:"normal",
  set(m){
    this.current=m;
    document.getElementById("modeLabel").innerText="modo "+m;
    return `ًں§  Modo "${m}" ativado.`;
  },
  is(m){return this.current===m}
};

/* ================= NLP ================= */
const ZeniaNLP={
  normalize(t){
    return t.toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
      .replace(/pq|pk/g,"porque")
      .replace(/oq|q/g,"que")
      .replace(/nd|ond/g,"onde")
      .replace(/fassa|fasr/g,"fazer")
      .replace(/vezes/g,"*")
      .replace(/dividido por/g,"/")
      .replace(/mais/g,"+")
      .replace(/menos/g,"-")
      .replace(/\s+/g," ")
      .trim();
  },
  intent(t){
    if(/[0-9].*[\+\-\*\/]/.test(t))return"calculo";
    if(/^porque/.test(t))return"porque";
    if(/^onde/.test(t))return"onde";
    if(/^quem/.test(t))return"quem";
    if(/^quando/.test(t))return"quando";
    if(/^o que|^que e/.test(t))return"definicao";
    if(/^(faأ§a|fazer|criar|gerar)/.test(t))return"acao";
    if(/ativa modo|modo /.test(t))return"modo";
    return"conversa";
  }
};

/* ================= MATEMأپTICA ================= */
function ZeniaMath(t){
  const expr=t.replace(/[^0-9+\-*/().]/g,"");
  if(!expr)return null;
  try{
    const r=Function(`"use strict";return(${expr})`)();
    return Number.isFinite(r)?r:null;
  }catch{return null;}
}

/* ================= RACIOCأچNIO ================= */
async function ZeniaReasoning(input){
  const clean=ZeniaNLP.normalize(input);
  const intent=ZeniaNLP.intent(clean);
  let steps=[];
  steps.push(`Passo 1: Texto entendido â†’ "${clean}"`);
  steps.push(`Passo 2: Intenأ§أ£o â†’ ${intent}`);

  if(intent==="calculo"){
    const r=ZeniaMath(clean);
    steps.push("Passo 3: Resolver cأ،lculo");
    steps.push(`Resultado final: ${r}`);
    return steps.join("\n");
  }

  steps.push("Passo 3: Anأ،lise lأ³gica");
  steps.push(`Conclusأ£o: Posso explicar ou pesquisar sobre "${clean}"`);
  return steps.join("\n");
}

/* ================= Cأ‰REBRO ================= */
async function ZeniaBrain(input){
  const clean=ZeniaNLP.normalize(input);
  const intent=ZeniaNLP.intent(clean);

  if(intent==="modo"){
    const m=clean.split("modo")[1]?.trim();
    if(m)return ZeniaMode.set(m);
  }

  if(ZeniaMode.is("raciocinio")){
    return ZeniaReasoning(input);
  }

  if(intent==="calculo"){
    const r=ZeniaMath(clean);
    if(r!==null)return `ًں§® Resultado: ${r}`;
  }

  if(intent==="onde")return`ًں“چ Estأ،s a perguntar onde fica "${input}".`;
  if(intent==="porque")return`ًں¤” Queres saber o motivo de "${input}".`;
  if(intent==="definicao")return`ًں“ک Vou explicar o que أ© "${input}".`;
  if(intent==="acao")return`âڑ™ï¸ڈ Pedido recebido: "${input}".`;

  return"ًں’¬ Entendi. Podes explicar melhor?";
}

/* ================= UI ================= */
function add(msg,cls){
  const d=document.createElement("div");
  d.className="message "+cls;
  d.innerText=msg;
  document.getElementById("messages").appendChild(d);
  d.scrollIntoView();
}

async function send(){
  const i=document.getElementById("userInput");
  if(!i.value)return;
  add("Vocأھ: "+i.value,"user");
  const r=await ZeniaBrain(i.value);
  add("Zenia: "+r,"bot");
  i.value="";
}

document.getElementById("userInput")
  .addEventListener("keydown",e=>{if(e.key==="Enter")send()});
</script>
</body>
</html>
