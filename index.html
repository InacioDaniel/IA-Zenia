<!-- ======= CSS ORIGINAL (INALTERADO) ======= -->
<style>

:root{
--bg-primary:#0f172a;--bg-secondary:#0f2130;--bg-tertiary:#152433;

<body>
<div id="app">

<!-- ======= HTML ORIGINAL (INALTERADO) ======= -->
<input id="userInput" placeholder="Digite sua mensagem...">
<button id="sendBtn">Enviar</button>
<div id="messages"></div>

</div>

<!-- ======= LIBS ======= -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.12.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<script>
/* =========================
   CORREÇÕES OBRIGATÓRIAS
   ========================= */

// NÃO EXISTIAM — agora existem
const LocalData = [];

function similarity(a,b){
if(!a||!b)return 0;
a=a.toLowerCase();b=b.toLowerCase();
let m=0;
a.split(" ").forEach(w=>{if(b.includes(w))m++});
return m/Math.max(a.split(" ").length,1);
}

/* =========================
   ZENIA NLP (INALTERADO)
   ========================= */
const ZeniaNLP={
normalize(t){return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"")},
intent(t){
if(/[0-9].*[\+\-\*\/]/.test(t))return"calculo";
if(/quem/.test(t))return"pessoa";
if(/onde/.test(t))return"localizacao";
if(/porque/.test(t))return"explicacao";
if(/o que e|oque e/.test(t))return"definicao";
return"conhecimento";
},
extractTopic:t=>t.replace(/o que e|oque e|quem e|onde fica|porque|explica/g,"").trim(),
parseMath:t=>t.replace(/vezes/g,"*").replace(/mais/g,"+").replace(/menos/g,"-")
};

/* =========================
   WIKIPÉDIA (INALTERADO)
   ========================= */
async function ZeniaKnowledgeEngine(msg){
const clean=ZeniaNLP.normalize(msg);
if(ZeniaNLP.intent(clean)==="calculo"){
try{return "🧮 Resultado: "+Function("return "+ZeniaNLP.parseMath(clean))();}
catch{return"Erro no cálculo";}
}
const topic=ZeniaNLP.extractTopic(clean);
if(!topic)return null;
try{
const r=await fetch("https://pt.wikipedia.org/api/rest_v1/page/summary/"+encodeURIComponent(topic));
if(!r.ok)return null;
const d=await r.json();
return d.extract||null;
}catch{return null}
}

/* =========================
   BOT (INALTERADO)
   ========================= */
async function getBotReply(msg){
const k=await ZeniaKnowledgeEngine(msg);
if(k)return k;
if(["oi","ola","olá"].includes(msg.toLowerCase()))return"👋 Olá!";
return"🤖 Ainda estou a aprender.";
}

/* =========================
   CHAT (FALTAVA)
   ========================= */
document.addEventListener("DOMContentLoaded",()=>{
const input=document.getElementById("userInput");
const btn=document.getElementById("sendBtn");
const msgs=document.getElementById("messages");

async function send(){
if(!input.value.trim())return;
const user=input.value;
msgs.innerHTML+=`<div class="message">🧑 ${user}</div>`;
input.value="";
const r=await getBotReply(user);
msgs.innerHTML+=`<div class="message">🤖 ${r}</div>`;
msgs.scrollTop=msgs.scrollHeight;
}

btn.onclick=send;
input.onkeydown=e=>{if(e.key==="Enter")send();}
});
</script>

</body>
</html>
